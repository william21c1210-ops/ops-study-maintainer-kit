      <circle cx="56" cy="30" r="7" fill="#f59e0b"/>
      <circle cx="80" cy="30" r="7" fill="#22c55e"/>
      <text x="28" y="80" fill="#38bdf8" font-size="22">$ ops-study-kit new-evidence-pack</text>
