<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Ops Study Maintainer Kit social preview</title>
  <desc id="desc">Terminal and Markdown evidence card preview for Ops Study Maintainer Kit.</desc>
  <rect width="1280" height="640" fill="#0f172a"/>
  <rect x="56" y="56" width="1168" height="528" rx="28" fill="#111827" stroke="#334155" stroke-width="2"/>

  <g font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="96" y="132" fill="#e2e8f0" font-size="56" font-weight="700">Ops Study Maintainer Kit</text>
    <text x="96" y="184" fill="#93c5fd" font-size="30" font-weight="600">Turn DevOps/SRE practice into reviewable evidence</text>
    <text x="96" y="228" fill="#cbd5e1" font-size="24">Linux · Networking · Cloud · Korean/Japanese docs</text>

    <g transform="translate(96 280)">
      <rect width="500" height="236" rx="18" fill="#020617" stroke="#1e293b" stroke-width="2"/>
